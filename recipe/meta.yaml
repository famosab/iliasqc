{% set name = "iliasqc" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: PLACEHOLDER_SHA256

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - iliasqc = iliasqc.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
  run:
    - python >=3.9

test:
  imports:
    - iliasqc
  commands:
    - iliasqc --help
  requires:
    - pip

about:
  home: https://github.com/famosab/iliasqc
  summary: Convert txt files into Ilias-compatible question-pool zip archives.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/famosab/iliasqc
  dev_url: https://github.com/famosab/iliasqc

extra:
  recipe-maintainers:
    - famosab
